name: event-chat-dev

services:

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"     # only nginx exposes a port
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth-service
      - user-service
      - chat-service
    restart: unless-stopped

  auth-service:
    build:
      context: ./auth-service
      target: dev
    volumes:
      - ./auth-service:/app
      - auth_node_modules:/app/node_modules
    env_file:
      - ./auth-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  user-service:
    build:
      context: ./user-service
      target: dev
    volumes:
      - ./user-service:/app
      - user_node_modules:/app/node_modules
    env_file:
      - ./user-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  chat-service:
    build:
      context: ./chat-service
      target: dev
    volumes:
      - ./chat-service:/app
      - chat_node_modules:/app/node_modules
    env_file:
      - ./chat-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: event_chat
    volumes:
      - postgres_data:/var/lib/postgresql/data  # persists across restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data  # persists across restarts
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  auth_node_modules:
  user_node_modules:
  chat_node_modules: