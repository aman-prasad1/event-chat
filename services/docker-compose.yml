name: event-chat

services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth-service
      - user-service
      - chat-service
    restart: unless-stopped

  auth-service:
    build:
      context: ./auth-service
      target: prod
    env_file:
      - ./auth-service/.env
    restart: unless-stopped

  user-service:
    build:
      context: ./user-service
      target: prod
    env_file:
      - ./user-service/.env
    restart: unless-stopped

  chat-service:
    build:
      context: ./chat-service
      target: prod
    env_file:
      - ./chat-service/.env
    restart: unless-stopped