name: CI — PR Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate-chat-service:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dummy_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: services/chat-service/package-lock.json

      - name: Install dependencies
        working-directory: services/chat-service
        run: npm ci

      - name: Generate Prisma client
        working-directory: services/chat-service
        run: npx prisma generate

      - name: Check for syntax errors
        working-directory: services/chat-service
        run: node --input-type=module --check < src/index.js

  validate-auth-service:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dummy_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
